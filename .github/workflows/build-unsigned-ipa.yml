name: Build unsigned iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-26-intel
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Validate plists
        run: |
          plutil -lint \
            Sources/PipBoardApp/Info.plist \
            Sources/PipBoardShareExtension/Info.plist \
            Sources/PipBoardBroadcastExtension/Info.plist

      - name: Validate resolver server
        run: node --check resolver-server/server.mjs

      - name: Generate project
        run: xcodegen generate

      - name: Build unsigned archive
        run: |
          xcodebuild \
            -project PipBoard.xcodeproj \
            -scheme PipBoard \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            archive \
            -archivePath build/PipBoard.xcarchive

      - name: Package unsigned IPA
        run: |
          mkdir -p build/Payload
          cp -R build/PipBoard.xcarchive/Products/Applications/PipBoard.app build/Payload/
          cd build
          zip -qry PipBoard-unsigned.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: PipBoard-unsigned-ipa
          path: build/PipBoard-unsigned.ipa
